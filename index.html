<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f9; color: #222; padding: 1.5rem; }
  .header { text-align: center; margin-bottom: 2rem; }
  .header h1 { font-size: 22px; font-weight: 700; color: #2c2c4e; }
  .header p { font-size: 13px; color: #777; margin-top: 4px; }
  .filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .filters input, .filters select { flex: 1; min-width: 150px; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; background: #fff; }
  .count { font-size: 13px; color: #888; margin-bottom: 1rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .card { background: #fff; border-radius: 14px; padding: 1.2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.07); display: flex; flex-direction: column; gap: 10px; }
  .card-header { display: flex; align-items: center; gap: 12px; }
  .avatar { width: 46px; height: 46px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .profile-label { font-size: 14px; font-weight: 700; color: #2c2c4e; }
  .profile-id { font-size: 10px; color: #aaa; font-family: monospace; margin-top: 2px; }
  .divider { border: none; border-top: 1px solid #f0f0f0; }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .info-item { display: flex; flex-direction: column; gap: 1px; }
  .info-label { font-size: 10px; color: #999; }
  .info-value { font-size: 12px; color: #333; font-weight: 600; }
  .card-footer { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px; }
  .badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 700; }
  .badge-teal { background: #e1f5ee; color: #085041; }
  .badge-amber { background: #faeeda; color: #633806; }
  .badge-purple { background: #eeedfe; color: #3c3489; }
  .tag { font-size: 11px; padding: 3px 9px; border-radius: 20px; background: #f4f4f4; color: #666; }
  .flex-row { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #888; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #1D9E75; flex-shrink: 0; }
  .no-result { text-align: center; padding: 2rem; color: #aaa; font-size: 14px; display: none; }
</style>
</head>
<body>

<div class="header">
  <h1>✦ Profils — Sœurs en Recherche de Mariage</h1>
  <p>Muslim Marriage Initiative · 29 profils anonymes</p>

<div class="filters">
  <input type="text" id="searchInput" placeholder="🔍 Ville, langue, origine..." oninput="filter()"/>
  <select id="langFilter" onchange="filter()">
    <option value="">Toutes les langues</option>
    <option value="english">English</option>
    <option value="french">French / Français</option>
    <option value="arabic">Arabic / Arabe</option>
    <option value="urdu">Urdu</option>
  </select>
  <select id="timeFilter" onchange="filter()">
    <option value="">Tous les délais</option>
    <option value="t1">1–2 mois</option>
    <option value="t2">3–6 mois</option>
    <option value="t3">6–12 mois</option>
    <option value="t4">12–24 mois</option>

</div>

<div class="count" id="countLabel">Affichage de 29 profils</div>
<div class="grid" id="grid"></div>

function badgeCls(k){ return k==='t1'||k==='t2'?'badge-teal':k==='t3'?'badge-amber':'badge-purple'; }

function buildCard(p, i) {
  const av = avColors[i % avColors.length];
  const isFr = p.lang === 'fr';
  const hasChildren = p.children !== 'No' && p.children !== 'Non';
  const num = String(i+1).padStart(2,'0');
  const search = [p.city,p.nationality,p.background,p.motherTongue,...p.languages,p.status].join(' ').toLowerCase();

  return `<div class="card" data-search="${search}" data-langs="${p.languages.join(',').toLowerCase()}" data-tkey="${p.tKey}">
  <div class="card-header">
    <div class="avatar" style="background:${av.bg}">${av.icon}</div>
    <div>
      <div class="profile-label">${isFr?'Profil Sœur':'Sister Profile'} #${num}</div>
      <div class="profile-id">${p.id}</div>
    </div>
  </div>
  <hr class="divider"/>
  <div class="info-grid">
    <div class="info-item"><div class="info-label">🎂 ${isFr?'Âge':'Age'}</div><div class="info-value">${p.age} ${isFr?'ans':'yrs'}</div></div>
    <div class="info-item"><div class="info-label">📏 ${isFr?'Taille':'Height'}</div><div class="info-value">${p.height}</div></div>
    <div class="info-item"><div class="info-label">📍 ${isFr?'Ville':'City'}</div><div class="info-value">${p.city}</div></div>
    <div class="info-item"><div class="info-label">🌍 ${isFr?'Nationalité':'Nationality'}</div><div class="info-value">${p.nationality}</div></div>
    <div class="info-item"><div class="info-label">🌱 ${isFr?'Origine':'Background'}</div><div class="info-value">${p.background}</div></div>
    <div class="info-item"><div class="info-label">🗣 ${isFr?'Langue mat.':'Mother tongue'}</div><div class="info-value">${p.motherTongue}</div></div>
    <div class="info-item" style="grid-column:1/-1"><div class="info-label">💬 ${isFr?'Langues parlées':'Spoken languages'}</div><div class="info-value">${p.languages.join(' · ')}</div></div>
    <div class="info-item"><div class="info-label">💍 ${isFr?'Statut':'Status'}</div><div class="info-value">${p.status}</div></div>
    <div class="info-item"><div class="info-label">👶 ${isFr?'Enfants':'Children'}</div><div class="info-value">${hasChildren?p.children:(isFr?'Non':'No')}</div></div>
  </div>
  <hr class="divider"/>
  <div class="card-footer">
    <span class="badge ${badgeCls(p.tKey)}">⏱ ${p.tLabel}</span>
    <span class="tag">✈️ ${p.relocate}</span>
  </div>
  <div class="flex-row">
    <div class="dot"></div>
    <span>${isFr?'Flexible si plus tôt ?':'Open if sooner?'} ${p.flexible}</span>
  </div>
</div>`;
}

document.getElementById('grid').innerHTML = profiles.map((p,i)=>buildCard(p,i)).join('');

function filter() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const lang = document.getElementById('langFilter').value.toLowerCase();
  const time = document.getElementById('timeFilter').value;
  let count = 0;
  document.querySelectorAll('.card').forEach(card => {
    const show = (!q || card.dataset.search.includes(q) || card.innerText.toLowerCase().includes(q))
              && (!lang || card.dataset.langs.includes(lang))
              && (!time || card.dataset.tkey === time);
    card.style.display = show ? '' : 'none';
    if(show) count++;
  });
  document.getElementById('countLabel').textContent = `Affichage de ${count} profil${count!==1?'s':''}`;
  document.getElementById('noResult').style.display = count===0?'block':'none';
}
</script>
