    search: '🔍 Ville, langue, origine...', allLang: '— Langue —', allTime: '— Délai —', allStatus: '— État civil —',
    allGender: '— Afficher —', sisters: 'Sœurs', brothers: 'Frères',
    neverMarried: 'Célibataire', divorced: 'Divorcée', allRelocate: '— Ouverte à déménager —', yes:'Oui', no:'Non', depends:'Selon',
    allChildren: '— Enfants —', noChildren:'Sans enfants', hasChildren:'Avec enfants', age:'Âge', sortNewest:'Plus récents',
    sortAgeAsc:'Âge croissant', sortAgeDesc:'Âge décroissant', reset:'Réinitialiser', showing:'Affichage de', profiles:'profil',
    profilesPlural:'profils', noResult:'Aucun profil ne correspond à vos filtres.', sisterProfile:'Profil Sœur', brotherProfile:'Profil Frère',
    ageLbl:'🎂 Âge', heightLbl:'📏 Taille', cityLbl:'📍 Ville', nationalityLbl:'🌍 Nationalité', backgroundLbl:'🌱 Origine',
    tongueLbl:'🗣 Langue maternelle', spokenLbl:'💬 Langues parlées', statusLbl:'💍 Statut', childrenLbl:'👶 Enfants',
    relocateTag:'✈️', openSooner:'Flexible si plus tôt ?', connectBtn:'🤝 Demander une mise en relation', yrs:'ans',
    modalTitle:'Demande de mise en relation', modalSub:"Envoyée à l'équipe admin — rien n'est partagé directement avec la sœur.",
    lblYourId:'Votre numéro de membre (MMID)', lblContact:'Meilleur moyen de vous joindre', lblMsg:'Note (optionnel)',
    cancel:'Annuler', send:'Envoyer la demande', toastOk:"Demande envoyée. L'équipe admin fera le suivi avec les deux parties.",

  }
};

let uiLang = 'en';
let activeProfileId = null;

function setUiLang(l) {
  uiLang = l;
  document.getElementById('btnEn').classList.toggle('active', l==='en');
  document.getElementById('btnFr').classList.toggle('active', l==='fr');
  document.documentElement.lang = l;
  renderStaticText();
  render();
}

function renderStaticText() {
  const s = STR[uiLang];
  document.getElementById('titleText').textContent = s.title;
  document.getElementById('subtitleText').innerHTML = `Muslim Marriage Initiative · <span id="profileCountTxt">${profiles.length}</span> ${s.subtitleSuffix}`;
  document.getElementById('genderFilter').options[0].text = s.allGender;
  document.getElementById('genderFilter').options[1].text = s.sisters;
  document.getElementById('genderFilter').options[2].text = s.brothers;
  document.getElementById('searchInput').placeholder = s.search;
  document.getElementById('langFilter').options[0].text = s.allLang;
  document.getElementById('timeFilter').options[0].text = s.allTime;
  document.getElementById('timeFilter').options[1].text = TIMELINE_MAP.t1[uiLang];
  document.getElementById('timeFilter').options[2].text = TIMELINE_MAP.t2[uiLang];
  document.getElementById('timeFilter').options[3].text = TIMELINE_MAP.t3[uiLang];
  document.getElementById('timeFilter').options[4].text = TIMELINE_MAP.t4[uiLang];
  document.getElementById('statusFilter').options[0].text = s.allStatus;
  document.getElementById('statusFilter').options[1].text = s.neverMarried;
  document.getElementById('statusFilter').options[2].text = s.divorced;
  document.getElementById('relocateFilter').options[0].text = s.allRelocate;
  document.getElementById('relocateFilter').options[1].text = s.yes;
  document.getElementById('relocateFilter').options[2].text = s.no;
  document.getElementById('relocateFilter').options[3].text = s.depends;
  document.getElementById('childrenFilter').options[0].text = s.allChildren;
  document.getElementById('childrenFilter').options[1].text = s.noChildren;
  document.getElementById('childrenFilter').options[2].text = s.hasChildren;
  document.getElementById('ageLabel').textContent = s.age;
  document.getElementById('sortSelect').options[0].text = s.sortNewest;
  document.getElementById('sortSelect').options[1].text = s.sortAgeAsc;
  document.getElementById('sortSelect').options[2].text = s.sortAgeDesc;
  document.getElementById('resetBtn').textContent = s.reset;
  document.getElementById('noResult').textContent = s.noResult;
  document.getElementById('modalTitle').textContent = s.modalTitle;
  document.getElementById('modalSub').textContent = s.modalSub;
  document.getElementById('lblYourId').textContent = s.lblYourId;
  document.getElementById('lblContact').textContent = s.lblContact;
  document.getElementById('lblMsg').textContent = s.lblMsg;
  document.getElementById('btnCancel').textContent = s.cancel;
  document.getElementById('btnSend').textContent = s.send;
}

function buildCard(p, i) {
  const s = STR[uiLang];
  const av = avColors[i % avColors.length];
  const num = String(i+1).padStart(2,'0');
  const statusDisplay = tr(STATUS_MAP, p.status, uiLang);
  const childrenDisplay = tr(CHILDREN_MAP, p.children, uiLang);
  const relocateDisplay = tr(RELOCATE_MAP, p.relocate, uiLang);
  const flexibleDisplay = tr(FLEXIBLE_MAP, p.flexible, uiLang);
  const backgroundDisplay = tr(BACKGROUND_MAP, p.background, uiLang);
  const timelineDisplay = TIMELINE_MAP[p.tKey][uiLang];
  const search = [p.city,p.nationality,p.background,p.motherTongue,...p.languages,p.status].join(' ').toLowerCase();

  return `<div class="card"
    data-search="${search}" data-langs="${p.languages.join(',').toLowerCase()}" data-tkey="${p.tKey}"
    data-age="${p.age}" data-statusgroup="${STATUS_GROUP(p.status)}" data-relocategroup="${RELOCATE_GROUP(p.relocate)}"
    data-childrengroup="${CHILDREN_GROUP(p.children)}" data-gender="${p.gender}">
  <div class="card-header">
    <div class="avatar" style="background:${av.bg}">👤</div>
    <div>
      <div class="profile-label">${p.gender==='M' ? s.brotherProfile : s.sisterProfile} #${num}</div>
      <div class="profile-id">${p.id}</div>
    </div>
  </div>
  <hr class="divider"/>
  <div class="info-grid">
    <div class="info-item"><div class="info-label">${s.ageLbl}</div><div class="info-value">${p.age} ${s.yrs}</div></div>
    <div class="info-item"><div class="info-label">${s.heightLbl}</div><div class="info-value">${p.height}</div></div>
    <div class="info-item"><div class="info-label">${s.cityLbl}</div><div class="info-value">${p.city}</div></div>
    <div class="info-item"><div class="info-label">${s.nationalityLbl}</div><div class="info-value">${p.nationality}</div></div>
    <div class="info-item"><div class="info-label">${s.backgroundLbl}</div><div class="info-value">${backgroundDisplay}</div></div>
    <div class="info-item"><div class="info-label">${s.tongueLbl}</div><div class="info-value">${p.motherTongue}</div></div>
    <div class="info-item" style="grid-column:1/-1"><div class="info-label">${s.spokenLbl}</div><div class="info-value">${p.languages.join(' · ')}</div></div>
    <div class="info-item"><div class="info-label">${s.statusLbl}</div><div class="info-value">${statusDisplay}</div></div>
    <div class="info-item"><div class="info-label">${s.childrenLbl}</div><div class="info-value">${childrenDisplay}</div></div>
  </div>
  <hr class="divider"/>
  <div class="card-footer">
    <span class="badge ${badgeCls(p.tKey)}">⏱ ${timelineDisplay}</span>
    <span class="tag">${s.relocateTag} ${relocateDisplay}</span>
  </div>
  <div class="flex-row">
    <div class="dot"></div>
    <span>${s.openSooner} ${flexibleDisplay}</span>
  </div>
  <button class="connect-btn" onclick="openModal('${p.id}')">${s.connectBtn}</button>
</div>`;
}

function render() {
  document.getElementById('grid').innerHTML = profiles.map((p,i)=>buildCard(p,i)).join('');
  filter();
}

function resetFilters() {
  document.getElementById('genderFilter').value = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('langFilter').value = '';
  document.getElementById('timeFilter').value = '';
  document.getElementById('statusFilter').value = '';
  document.getElementById('relocateFilter').value = '';
  document.getElementById('childrenFilter').value = '';
  document.getElementById('ageMin').value = '';
  document.getElementById('ageMax').value = '';
  document.getElementById('sortSelect').value = 'newest';
  filter();
}

function filter() {
  const s = STR[uiLang];
  const gender = document.getElementById('genderFilter').value;
  const q = document.getElementById('searchInput').value.toLowerCase();
  const lang = document.getElementById('langFilter').value.toLowerCase();
  const time = document.getElementById('timeFilter').value;
  const status = document.getElementById('statusFilter').value;
  const relocate = document.getElementById('relocateFilter').value;
  const childrenF = document.getElementById('childrenFilter').value;
  const ageMin = parseFloat(document.getElementById('ageMin').value);
  const ageMax = parseFloat(document.getElementById('ageMax').value);
  const sort = document.getElementById('sortSelect').value;

  const cards = Array.from(document.querySelectorAll('.card'));

  // sort
  cards.sort((a,b) => {
    if (sort === 'age_asc') return (+a.dataset.age) - (+b.dataset.age);
    if (sort === 'age_desc') return (+b.dataset.age) - (+a.dataset.age);
    return 0; // newest first = original document order
  });
  const grid = document.getElementById('grid');
  cards.forEach(c => grid.appendChild(c));

  let count = 0;
  cards.forEach(card => {
    const age = +card.dataset.age;
    const show = (!gender || card.dataset.gender === gender)
              && (!q || card.dataset.search.includes(q) || card.innerText.toLowerCase().includes(q))
              && (!lang || card.dataset.langs.includes(lang))
              && (!time || card.dataset.tkey === time)
              && (!status || card.dataset.statusgroup === status)
              && (!relocate || card.dataset.relocategroup === relocate)
              && (!childrenF || card.dataset.childrengroup === childrenF)
              && (isNaN(ageMin) || age >= ageMin)
              && (isNaN(ageMax) || age <= ageMax);
    card.style.display = show ? '' : 'none';
    if (show) count++;
  });
  document.getElementById('countLabel').textContent = `${s.showing} ${count} ${count===1?s.profiles:s.profilesPlural}`;
  document.getElementById('noResult').style.display = count===0 ? 'block' : 'none';
}

/* ------------------------------------------------------------
   REQUEST TO CONNECT
   ------------------------------------------------------------ */
function openModal(profileId) {
  activeProfileId = profileId;
  document.getElementById('reqMmid').value = '';
  document.getElementById('reqContact').value = '';
  document.getElementById('reqMsg').value = '';
  document.getElementById('modalBackdrop').classList.add('open');
}
function closeModal() {
  document.getElementById('modalBackdrop').classList.remove('open');
  activeProfileId = null;
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3500);
}

async function submitRequest() {
  const s = STR[uiLang];
  const mmid = document.getElementById('reqMmid').value.trim();
  const contact = document.getElementById('reqContact').value.trim();
  const msg = document.getElementById('reqMsg').value.trim();

  if (!mmid || !contact) { alert(s.needFields); return; }

  const payload = {
    targetProfileId: activeProfileId,
    requesterMmid: mmid,
    requesterContact: contact,
    message: msg,
    timestamp: new Date().toISOString()
  };

  if (CONFIG.MATCH_ENDPOINT) {
    try {
      // Apps Script web apps don't support JSON pre-flight CORS, so we
      // send as text/plain — the .gs backend parses it as JSON itself.
      await fetch(CONFIG.MATCH_ENDPOINT, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });
      showToast(s.toastOk);
      closeModal();
    } catch (e) {
      fallbackEmail(payload);
      showToast(s.toastErr);
      closeModal();
    }
  } else {
    fallbackEmail(payload);
    closeModal();
  }
}

function fallbackEmail(payload) {
  const subject = encodeURIComponent(`Match request: ${payload.targetProfileId}`);
  const body = encodeURIComponent(
    `Target profile: ${payload.targetProfileId}\nRequester MMID: ${payload.requesterMmid}\nContact: ${payload.requesterContact}\nMessage: ${payload.message}`
  );
  window.location.href = `mailto:${CONFIG.ADMIN_EMAIL}?subject=${subject}&body=${body}`;
}

renderStaticText();
render();
</script>
